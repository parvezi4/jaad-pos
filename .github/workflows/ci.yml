name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run backend tests
        run: npm run test:backend

  test-pos-app:
    name: POS App Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run pos-app tests
        run: npm run test --workspace=packages/pos-app

  test-e2e:
    name: Customer App E2E Tests
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache node_modules for E2E
        id: e2e-node-modules-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/customer-app/node_modules
          key: ${{ runner.os }}-node20-e2e-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.e2e-node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: packages/customer-app

      - name: Validate Playwright browsers (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
        working-directory: packages/customer-app

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
